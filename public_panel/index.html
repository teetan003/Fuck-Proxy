<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Proxy Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- QRCode.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-primary: #3b82f6;
            --accent-secondary: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Gradients */
        .blob {
            position: absolute;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out alternate;
        }
        .blob-1 {
            top: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-secondary), transparent 70%);
        }
        .blob-2 {
            bottom: -10%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-primary), transparent 70%);
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* Glassmorphism Container */
        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
            position: relative;
            z-index: 10;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* IP Status Section */
        .status-card {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }

        .status-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--success);
            box-shadow: 0 0 15px var(--success);
        }

        .status-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .status-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-indicator {
            width: 10px;
            height: 10px;
            background-color: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .ip-address {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.3rem;
            color: #60a5fa;
            word-break: break-all;
            background: rgba(255,255,255,0.05);
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .update-time {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: right;
        }

        /* Proxy Share Section */
        .share-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .qr-container {
            background: #fff;
            padding: 15px;
            border-radius: 16px;
            display: inline-block;
            margin: 0 auto;
            transition: transform 0.3s;
        }
        .qr-container:hover {
            transform: scale(1.05);
        }

        .proxy-link-box {
            display: flex;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .proxy-link-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            outline: none;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .copy-btn {
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            padding: 0 25px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .copy-btn:hover {
            opacity: 0.9;
        }

        .copy-btn:active {
            transform: scale(0.98);
        }

        .notification {
            position: absolute;
            top: -40px;
            right: 0;
            background: var(--success);
            color: white;
            padding: 5px 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .notification.show {
            opacity: 1;
        }

        .loading {
            color: var(--text-muted);
            font-style: italic;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                margin: 20px;
                padding: 30px 20px;
            }
            h1 { font-size: 2rem; }
            .proxy-link-box { flex-direction: column; }
            .copy-btn { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <header>
            <h1>Fuck-Proxy</h1>
            <p class="subtitle">Premium Auto-Rotating IPv6 Network</p>
        </header>

        <div class="status-card">
            <div class="status-header">
                <h2><div class="live-indicator"></div> Live Outbound IPv6</h2>
            </div>
            <div class="ip-address" id="ip-display">
                <span class="loading">Đang tải dữ liệu...</span>
            </div>
            <div class="update-time" id="time-display">Cập nhật lần cuối: --:--:--</div>
        </div>

        <div class="share-section">
            <div style="text-align: center;">
                <p style="color: var(--text-muted); margin-bottom: 15px;">Quét mã QR để kết nối Proxy</p>
                <div class="qr-container" id="qrcode"></div>
            </div>

            <div style="position: relative;">
                <p style="color: var(--text-muted); margin-bottom: 10px;">Hoặc copy Link (Subscription/VLESS):</p>
                <div class="proxy-link-box">
                    <input type="text" id="proxy-link" class="proxy-link-input" readonly value="Đang tải link...">
                    <button class="copy-btn" onclick="copyLink()">Copy Link</button>
                </div>
                <div class="notification" id="copy-notify">Đã copy!</div>
            </div>
        </div>
    </div>

    <script>
        let qrcode = null;
        let proxyLinkData = "";

        // Function to copy text to clipboard
        function copyLink() {
            const copyText = document.getElementById("proxy-link");
            copyText.select();
            copyText.setSelectionRange(0, 99999); /* For mobile devices */
            document.execCommand("copy");
            
            const notify = document.getElementById("copy-notify");
            notify.classList.add("show");
            setTimeout(() => {
                notify.classList.remove("show");
            }, 2000);
        }

        // Function to fetch status (IPv6)
        async function fetchStatus() {
            try {
                // Fetch status.json (updated by ipv6_rotate.sh)
                const response = await fetch('status.json?t=' + new Date().getTime());
                if(response.ok) {
                    const data = await response.json();
                    if(data.ipv6) {
                        document.getElementById('ip-display').innerText = data.ipv6;
                        document.getElementById('time-display').innerText = "Cập nhật lần cuối: " + data.updated_at;
                    }
                }
            } catch (e) {
                console.log("Waiting for status.json...");
            }
        }

        // Function to fetch config (Proxy Link)
        async function fetchConfig() {
            try {
                // Fetch config.json (created by user)
                const response = await fetch('config.json?t=' + new Date().getTime());
                if(response.ok) {
                    const data = await response.json();
                    if(data.proxy_link) {
                        proxyLinkData = data.proxy_link;
                        document.getElementById('proxy-link').value = proxyLinkData;
                        
                        // Generate QR Code
                        document.getElementById('qrcode').innerHTML = ""; // clear old
                        qrcode = new QRCode(document.getElementById("qrcode"), {
                            text: proxyLinkData,
                            width: 180,
                            height: 180,
                            colorDark : "#0f172a",
                            colorLight : "#ffffff",
                            correctLevel : QRCode.CorrectLevel.M
                        });
                    }
                } else {
                    document.getElementById('proxy-link').value = "Chưa cấu hình config.json trên Server.";
                }
            } catch (e) {
                console.log("Waiting for config.json...");
                document.getElementById('proxy-link').value = "Không tìm thấy config.json.";
            }
        }

        // Initialize
        window.onload = () => {
            fetchConfig();
            fetchStatus();
            // Poll for IPv6 updates every 10 seconds
            setInterval(fetchStatus, 10000);
        };
    </script>
</body>
</html>
